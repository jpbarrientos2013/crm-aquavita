// ── Apps Script API helpers ────────────────────────────────────────────────
async function scriptGet() {
  const r = await fetch(SCRIPT_URL);
  if (!r.ok) throw new Error("HTTP " + r.status);
  const json = await r.json();
  if (!json.ok) throw new Error(json.error || "Error del servidor");
  return json;
}

async function scriptPost(payload) {
  const body = "payload=" + encodeURIComponent(JSON.stringify(payload));
  const r = await fetch(SCRIPT_URL, {
    method: "POST",
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body: body,
  });
  if (!r.ok) throw new Error("HTTP " + r.status);
  const json = await r.json();
  if (!json.ok) throw new Error(json.error || "Error del servidor");
  return json;
}

// Row array ↔ lead object
function rowToLead(rowData, sheetRow) {
  const r = rowData;
  return {
    _row:      sheetRow,
    id:        r[0]  || "",
    fecha:     r[1]  || "",
    comercial: r[2]  || "",
    rol:       r[3]  || "",
    canal:     r[4]  || "",
    cliente:   r[5]  || "",
    domicilio: r[6]  || "",
    tel:       r[7]  || "",
    email:     r[8]  || "",
    productos: r[9]  ? String(r[9]).split(";").map(s=>s.trim()).filter(Boolean) : [],
    etapa:     r[10] || "Prospecto",
    valor:     Number(r[11]) || 0,
    prob:      Number(r[12]) || 0,
    accion:    r[13] || "",
    fechaAcc:  r[14] || "",
    notas:     r[15] || "",
    estado:    r[16] || "Activo",
  };
}

function leadToRow(lead) {
  const prods = Array.isArray(lead.productos) ? lead.productos.join("; ") : lead.productos || "";
  return [
    lead.id, lead.fecha, lead.comercial, lead.rol, lead.canal || "",
    lead.cliente, lead.domicilio || "", lead.tel || "", lead.email || "",
    prods, lead.etapa,
    lead.valor, lead.prob,
    lead.accion || "", lead.fechaAcc || "", lead.notas || "", lead.estado,
  ];
}

function CRMApp(){
  const [currentUser,setCU]   = useState(null);
  const [leads,setLeads]      = useState([]);
  const [sync,setSync]        = useState("idle");
  const [lastSync,setLS]      = useState(null);
  const [modal,setModal]      = useState(null);
  const [saving,setSaving]    = useState(false);
  const [toast,setToast]      = useState({msg:"",type:"ok"});
  const [search,setSearch]    = useState("");
  const [fEtapa,setFEtapa]    = useState("Todas");
  const [fCom,setFCom]        = useState("Todos");
  const [fCanal,setFCanal]    = useState("Todos");
  const [view,setView]        = useState("tabla");
  const [tab,setTab]          = useState("leads");

  // ── Load from Sheets via Apps Script ──
  const loadLeads = useCallback(async () => {
    setSync("loading");
    try {
      const data = await scriptGet();
      const loaded = (data.rows||[]).map(r => rowToLead(r.data, r._row));
      setLeads(loaded);
      setSync("ok");
      setLS(new Date());
    } catch(e) {
      console.error(e);
      setSync("error");
      showToast("Error al cargar: " + e.message, "error");
    }
  }, []);

  useEffect(() => { if(currentUser) loadLeads(); }, [currentUser]);

  // ── Save lead ──
  async function saveLead(form) {
    setSaving(true);
    setSync("saving");
    const isNew = modal === "new";
    const maxId = leads.length > 0 ? Math.max(...leads.map(l=>Number(l.id)||0)) : 0;
    const saved = {
      ...form,
      id:    isNew ? String(maxId+1) : form.id,
      valor: Number(form.valor),
      prob:  Number(form.prob),
    };

    // Optimistic local update
    if(isNew) {
      setLeads(ls => [...ls, {...saved, _row: ls.length+2}]);
    } else {
      setLeads(ls => ls.map(l => l._row===form._row ? {...saved,_row:form._row} : l));
    }
    setModal(null);

    try {
      if(isNew) {
        await scriptPost({ action:"append", row: leadToRow(saved) });
      } else {
        await scriptPost({ action:"update", rowIndex: form._row, row: leadToRow(saved) });
      }
      setSync("ok");
      setLS(new Date());
      showToast(isNew ? "Lead agregado en Google Sheets ✓" : "Lead actualizado en Google Sheets ✓", "ok");
      // Reload to get real row indices
      await loadLeads();
    } catch(e) {
      console.error(e);
      setSync("error");
      showToast("Guardado localmente. Error al sincronizar: " + e.message, "warn");
    } finally {
      setSaving(false);
    }
  }

  function showToast(msg,type="ok"){
    setToast({msg,type});
    setTimeout(()=>setToast({msg:"",type:"ok"}),4500);
  }

  if(!currentUser) return <Login onLogin={u=>{setCU(u);if(PERMS[u.rol]&&!PERMS[u.rol].verTodos)setFCom(u.nombre);}}/>;

  const perm = PERMS[currentUser.rol]||{};
  const comerciales = [...new Set(leads.map(l=>l.comercial).filter(Boolean))];

  const filtered = leads.filter(l=>{
    const q=search.toLowerCase();
    const mq=!q||[l.cliente,l.comercial,l.email,l.domicilio,l.canal,...(l.productos||[])].some(v=>(v||"").toLowerCase().includes(q));
    const me=fEtapa==="Todas"||l.etapa===fEtapa;
    const mc=fCom==="Todos"||l.comercial===fCom;
    const mk=fCanal==="Todos"||l.canal===fCanal;
    const mv=perm.verTodos||(l.comercial===currentUser.nombre);
    return mq&&me&&mc&&mk&&mv;
  });

  const pipeline  = filtered.reduce((s,l)=>s+(Number(l.valor)||0),0);
  const ponderado = filtered.reduce((s,l)=>s+(Number(l.valor)||0)*(Number(l.prob)||0)/100,0);
  const cerrados  = filtered.filter(l=>l.etapa==="Cerrado").length;

  const navBtn=(t,icon,label)=>(
    <button onClick={()=>setTab(t)} style={{padding:"7px 13px",borderRadius:8,border:`1px solid ${D.border}`,background:tab===t?D.accent:"transparent",color:tab===t?"#fff":D.muted,cursor:"pointer",fontSize:13,fontWeight:tab===t?600:400,display:"flex",alignItems:"center",gap:5}}>
      <i className={`ti ${icon}`} style={{fontSize:15}} aria-hidden="true"/>{label}
    </button>);
  const viewBtn=(v,icon,label)=>(
    <button onClick={()=>setView(v)} style={{padding:"6px 11px",borderRadius:8,border:`1px solid ${D.border}`,background:view===v?D.accent:"transparent",color:view===v?"#fff":D.muted,cursor:"pointer",fontSize:12,display:"flex",alignItems:"center",gap:4}}>
      <i className={`ti ${icon}`} style={{fontSize:14}} aria-hidden="true"/>{label}
    </button>);

  const TH={padding:"9px 12px",textAlign:"left",fontSize:11,fontWeight:600,color:D.muted,borderBottom:`1px solid ${D.border}`,whiteSpace:"nowrap",background:D.surface};
  const TD={padding:"10px 12px",fontSize:13,color:D.text,borderBottom:`1px solid ${D.border}`};

  return (
    <div style={{padding:"0 0 2rem",fontFamily:"var(--font-sans)",background:D.bg,minHeight:"100vh",color:D.text}}>
      <style>{"@keyframes spin{to{transform:rotate(360deg)}}"}</style>
      <h2 className="sr-only">CRM Comercial AquaVita — Google Sheets</h2>

      {/* ── Header ── */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:10}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <img src={LOGO_B64} alt="AquaVita" style={{height:42,objectFit:"contain"}}/>
          <div>
            <h2 style={{margin:0,fontSize:16,fontWeight:600,color:D.text}}>CRM Comercial</h2>
            <div style={{display:"flex",alignItems:"center",gap:7,marginTop:2}}>
              <span style={{fontSize:11,color:D.muted}}>{currentUser.nombre}</span>
              <SyncBadge status={sync}/>
              {lastSync&&<span style={{fontSize:10,color:D.muted}}>{lastSync.toLocaleTimeString("es-AR",{hour:"2-digit",minute:"2-digit"})}</span>}
            </div>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:7}}>
          <RoleBadge rol={currentUser.rol}/>
          <button onClick={loadLeads} disabled={sync==="loading"} style={{padding:"6px 10px",borderRadius:8,border:`1px solid ${D.border}`,background:"transparent",cursor:"pointer",color:D.muted,display:"flex",alignItems:"center",gap:4,fontSize:12}}>
            <i className="ti ti-refresh" style={{fontSize:14,animation:sync==="loading"?"spin 1s linear infinite":"none"}} aria-hidden="true"/>Actualizar
          </button>
          <button onClick={()=>setCU(null)} style={{padding:"6px 11px",borderRadius:8,border:`1px solid ${D.border}`,background:"transparent",cursor:"pointer",fontSize:12,color:D.muted,display:"flex",alignItems:"center",gap:4}}>
            <i className="ti ti-logout" style={{fontSize:14}}/>Salir
          </button>
        </div>
      </div>

      {/* ── Tabs ── */}
      <div style={{display:"flex",gap:7,marginBottom:18,flexWrap:"wrap"}}>
        {navBtn("leads","ti-list","Leads")}
        {perm.reportes&&navBtn("permisos","ti-shield","Permisos")}
        {perm.usuarios&&navBtn("usuarios","ti-users","Usuarios")}
      </div>

      {/* ── Toast ── */}
      {toast.msg&&<div style={{background:toast.type==="ok"?"#052e16":toast.type==="warn"?"#3d2a00":"#3d0a0a",color:toast.type==="ok"?"#4ade80":toast.type==="warn"?"#fbbf24":"#f87171",padding:"10px 14px",borderRadius:8,fontSize:13,marginBottom:14,display:"flex",gap:8,alignItems:"center"}}>
        <i className={`ti ${toast.type==="ok"?"ti-circle-check":"ti-alert-triangle"}`} style={{fontSize:15,flexShrink:0}} aria-hidden="true"/>{toast.msg}
      </div>}

      {/* ══ LEADS ══ */}
      {tab==="leads"&&<>
        {/* Stats */}
        <div style={{display:"flex",gap:10,marginBottom:18,flexWrap:"wrap"}}>
          <Stat label="Leads" value={filtered.length} color="#60a5fa" icon="ti-users"/>
          <Stat label="Cerrados" value={cerrados} color="#4ade80" icon="ti-circle-check"/>
          <Stat label="Pipeline" value={`$${fmt(pipeline)}`} color="#fb923c" icon="ti-trending-up"/>
          <Stat label="Ponderado" value={`$${fmt(Math.round(ponderado))}`} color="#a78bfa" icon="ti-chart-bar"/>
        </div>

        {/* Toolbar */}
        <div style={{display:"flex",gap:7,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
          <div style={{position:"relative",flex:"1 1 180px"}}>
            <i className="ti ti-search" style={{position:"absolute",left:9,top:"50%",transform:"translateY(-50%)",fontSize:14,color:D.muted}} aria-hidden="true"/>
            <input placeholder="Buscar..." value={search} onChange={e=>setSearch(e.target.value)} style={{...INP,paddingLeft:32}}/>
          </div>
          <select value={fEtapa} onChange={e=>setFEtapa(e.target.value)} style={{...INP,width:"auto",cursor:"pointer"}}>
            <option value="Todas">Todas las etapas</option>
            {INIT_ETAPAS.map(e=><option key={e.nombre} value={e.nombre}>{e.nombre}</option>)}
          </select>
          <select value={fCanal} onChange={e=>setFCanal(e.target.value)} style={{...INP,width:"auto",cursor:"pointer"}}>
            <option value="Todos">Todos los canales</option>
            {INIT_CANALES.map(c=><option key={c} value={c}>{c}</option>)}
          </select>
          {perm.verTodos&&<select value={fCom} onChange={e=>setFCom(e.target.value)} style={{...INP,width:"auto",cursor:"pointer"}}>
            <option value="Todos">Todos</option>
            {comerciales.map(c=><option key={c} value={c}>{c}</option>)}
          </select>}
          <div style={{display:"flex",gap:5}}>
            {viewBtn("tabla","ti-table","Tabla")}
            {viewBtn("kanban","ti-layout-columns","Kanban")}
          </div>
          {perm.cargar&&<button onClick={()=>setModal("new")} style={{padding:"8px 14px",borderRadius:8,border:"none",background:D.accent,color:"#fff",cursor:"pointer",fontSize:13,fontWeight:600,display:"flex",alignItems:"center",gap:5}}>
            <i className="ti ti-plus" style={{fontSize:15}} aria-hidden="true"/>Nuevo lead
          </button>}
        </div>

        {/* Loading */}
        {sync==="loading"&&leads.length===0&&<div style={{textAlign:"center",padding:48,color:D.muted}}>
          <i className="ti ti-refresh" style={{fontSize:34,display:"block",marginBottom:10,animation:"spin 1s linear infinite"}} aria-hidden="true"/>
          Cargando leads desde Google Sheets...
        </div>}

        {/* Error */}
        {sync==="error"&&leads.length===0&&<div style={{textAlign:"center",padding:48}}>
          <i className="ti ti-cloud-x" style={{fontSize:34,display:"block",marginBottom:10,color:D.danger}} aria-hidden="true"/>
          <div style={{color:D.danger,marginBottom:12}}>No se pudo conectar con Google Sheets</div>
          <button onClick={loadLeads} style={{padding:"8px 18px",borderRadius:8,border:"none",background:D.accent,color:"#fff",cursor:"pointer",fontSize:13}}>Reintentar</button>
        </div>}

        {/* TABLE */}
        {view==="tabla"&&sync!=="loading"&&<div style={{border:`1px solid ${D.border}`,borderRadius:12,overflow:"hidden"}}>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse"}}>
              <thead><tr>
                {["Comercial","Cliente","Canal","Productos","Etapa","Valor","Prob.","Próxima acción",""].map(h=><th key={h} style={TH}>{h}</th>)}
              </tr></thead>
              <tbody>
                {filtered.length===0&&<tr><td colSpan={9} style={{...TD,textAlign:"center",padding:40,color:D.muted}}>
                  <i className="ti ti-search-off" style={{fontSize:30,display:"block",marginBottom:8}} aria-hidden="true"/>
                  {leads.length===0?"El tablero está vacío. Agregá el primer lead.":"Sin resultados."}
                </td></tr>}
                {filtered.map(l=>{
                  const ce=perm.editarTodos||(perm.editarPropios&&l.comercial===currentUser.nombre);
                  const prods=Array.isArray(l.productos)?l.productos:[];
                  return <tr key={l._row} style={{background:D.surface}}
                    onMouseEnter={e=>e.currentTarget.style.background=D.card}
                    onMouseLeave={e=>e.currentTarget.style.background=D.surface}>
                    <td style={TD}><div style={{display:"flex",alignItems:"center",gap:7}}>
                      <Avatar name={l.comercial||"?"} size={26}/>
                      <div><div style={{fontSize:13,fontWeight:600}}>{l.comercial}</div>
                        <div style={{fontSize:11,color:D.muted}}>{l.fecha}</div></div>
                    </div></td>
                    <td style={TD}><div style={{fontWeight:600}}>{l.cliente}</div>
                      <div style={{fontSize:11,color:D.muted}}>{l.email}</div></td>
                    <td style={TD}>{l.canal&&<span style={{background:"rgba(41,121,255,0.13)",color:"#60a5fa",padding:"2px 7px",borderRadius:99,fontSize:11,fontWeight:500}}>📡 {l.canal}</span>}</td>
                    <td style={{...TD,maxWidth:170}}><div style={{display:"flex",flexWrap:"wrap",gap:3}}>
                      {prods.map(p=><span key={p} style={{background:"rgba(255,255,255,0.06)",color:D.muted,padding:"1px 6px",borderRadius:99,fontSize:11}}>{p}</span>)}
                    </div></td>
                    <td style={TD}><EtapaBadge etapa={l.etapa}/></td>
                    <td style={{...TD,fontWeight:600}}>${fmt(l.valor)}</td>
                    <td style={{...TD,color:l.prob>=70?"#4ade80":l.prob>=40?"#fb923c":D.muted,fontWeight:600}}>{l.prob}%</td>
                    <td style={{...TD,fontSize:12,color:D.muted}}>{l.accion}
                      {l.fechaAcc&&<div style={{fontSize:11}}>{l.fechaAcc}</div>}</td>
                    <td style={{...TD,whiteSpace:"nowrap"}}>
                      {ce&&<button onClick={()=>setModal(l)} style={{background:"rgba(255,255,255,0.04)",border:"none",cursor:"pointer",padding:"4px 6px",borderRadius:6,color:D.muted}}>
                        <i className="ti ti-edit" style={{fontSize:14}}/></button>}
                    </td>
                  </tr>;
                })}
              </tbody>
            </table>
          </div>
        </div>}

        {/* KANBAN */}
        {view==="kanban"&&sync!=="loading"&&<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:10}}>
          {INIT_ETAPAS.map(etapa=>{
            const cols=filtered.filter(l=>l.etapa===etapa.nombre);
            return <div key={etapa.nombre}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:9}}>
                <EtapaBadge etapa={etapa.nombre}/>
                <span style={{fontSize:12,fontWeight:600,color:D.muted}}>{cols.length}</span>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:7}}>
                {cols.length===0&&<div style={{border:`1px dashed ${D.border}`,borderRadius:8,padding:14,textAlign:"center",fontSize:12,color:D.muted}}>Sin leads</div>}
                {cols.map(l=>{
                  const ce=perm.editarTodos||(perm.editarPropios&&l.comercial===currentUser.nombre);
                  const prods=Array.isArray(l.productos)?l.productos:[];
                  return <div key={l._row} onClick={()=>ce&&setModal(l)}
                    style={{background:D.card,border:`1px solid ${D.border}`,borderRadius:9,padding:11,cursor:ce?"pointer":"default"}}>
                    <div style={{fontSize:13,fontWeight:600,marginBottom:2,color:D.text}}>{l.cliente}</div>
                    {l.canal&&<div style={{fontSize:10,color:"#60a5fa",marginBottom:3}}>📡 {l.canal}</div>}
                    <div style={{display:"flex",flexWrap:"wrap",gap:3,marginBottom:6}}>
                      {prods.map(p=><span key={p} style={{background:"rgba(255,255,255,0.05)",color:D.muted,padding:"1px 5px",borderRadius:99,fontSize:10}}>{p}</span>)}
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:7}}>
                      <Avatar name={l.comercial||"?"} size={17}/>
                      <span style={{fontSize:11,color:D.muted}}>{l.comercial}</span>
                    </div>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <span style={{fontSize:12,fontWeight:600,color:etapa.color}}>${fmt(l.valor)}</span>
                      <span style={{fontSize:11,background:"rgba(255,255,255,0.05)",padding:"1px 6px",borderRadius:99,color:D.muted}}>{l.prob}%</span>
                    </div>
                    {l.accion&&<div style={{marginTop:6,fontSize:11,color:D.muted,display:"flex",gap:3,alignItems:"center"}}>
                      <i className="ti ti-clock" style={{fontSize:11}}/>{l.accion}</div>}
                  </div>;
                })}
              </div>
            </div>;
          })}
        </div>}
      </>}

      {/* ══ PERMISOS ══ */}
      {tab==="permisos"&&perm.reportes&&<div style={{overflowX:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse",border:`1px solid ${D.border}`,borderRadius:12,overflow:"hidden"}}>
          <thead><tr style={{background:D.card}}>
            {["Rol","Ver todos","Cargar","Editar propios","Editar todos","Eliminar","Reportes","Usuarios"].map((h,i)=>(
              <th key={h} style={{...TH,textAlign:i===0?"left":"center"}}>{h}</th>))}
          </tr></thead>
          <tbody>{Object.entries(PERMS).map(([rol,p],i)=>(
            <tr key={rol} style={{background:i%2===0?D.surface:D.card}}>
              <td style={{...TD,textAlign:"left"}}><RoleBadge rol={rol}/></td>
              {["verTodos","cargar","editarPropios","editarTodos","eliminar","reportes","usuarios"].map(c=>(
                <td key={c} style={{...TD,textAlign:"center"}}>
                  {p[c]?<span style={{color:D.success,fontSize:17}}>✓</span>:<span style={{color:"rgba(255,255,255,0.1)",fontSize:17}}>−</span>}
                </td>))}
            </tr>))}
          </tbody>
        </table>
      </div>}

      {/* ══ USUARIOS ══ */}
      {tab==="usuarios"&&perm.usuarios&&<div>
        <div style={{marginBottom:14,display:"flex",justifyContent:"space-between"}}>
          <h3 style={{margin:0,fontSize:14,fontWeight:600,color:D.text}}>Usuarios del equipo</h3>
          <span style={{fontSize:12,color:D.muted}}>{USERS.length} usuarios</span>
        </div>
        <div style={{border:`1px solid ${D.border}`,borderRadius:12,overflow:"hidden"}}>
          {USERS.map((u,i)=><div key={u.id} style={{display:"flex",alignItems:"center",gap:11,padding:"12px 15px",borderBottom:i<USERS.length-1?`1px solid ${D.border}`:"none",background:u.activo?D.card:"#16161e"}}>
            <Avatar name={u.nombre} size={34}/>
            <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600,color:u.activo?D.text:D.muted}}>{u.nombre}</div>
              <div style={{fontSize:11,color:D.muted}}>{u.usuario}</div></div>
            <RoleBadge rol={u.rol}/>
            <div style={{fontSize:11,fontWeight:600,color:u.activo?D.success:D.danger}}>{u.activo?"✅ Activo":"❌ Baja"}</div>
            <div style={{fontSize:11,color:D.muted,fontFamily:"var(--font-mono)",background:"rgba(255,255,255,0.04)",padding:"2px 8px",borderRadius:5}}>{u.password}</div>
          </div>)}
        </div>
      </div>}

      {modal&&<LeadModal lead={modal==="new"?null:modal} onClose={()=>!saving&&setModal(null)} onSave={saveLead} saving={saving} currentUser={currentUser} perm={perm}/>}

      <div style={{marginTop:20,padding:"10px 15px",background:D.card,borderRadius:9,fontSize:11,color:D.muted,display:"flex",gap:7,alignItems:"center",border:`1px solid ${D.border}`}}>
        <i className="ti ti-info-circle" style={{fontSize:14,flexShrink:0}} aria-hidden="true"/>
        Sincronizado con Google Sheets via Apps Script · Cada lead se guarda instantáneamente en <strong style={{color:D.text}}>CRM AquaVita — Tablero General</strong>
      </div>
    </div>
  );
}

    const container = document.getElementById("root");
    const reactRoot = ReactDOM.createRoot(container);
    reactRoot.render(React.createElement(CRMApp));
  </script>
</body>
</html>
